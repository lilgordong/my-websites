<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Client Workspace - DON Tax Services</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>DON Tax Services Client Workspace</h1>
</header>

<div class="dashboard-grid">

<div class="panel">

<h3>Your Tasks</h3>

<ul id="taskList">
<li>Upload T4 documents</li>
<li>Verify personal information</li>
<li>Review tax summary</li>
</ul>

<input type="text" id="newTask" placeholder="Add task">

<button onclick="addTask()">Add Task</button>

</div>


<div class="panel">

<h3>Upload Documents</h3>

<input type="file" multiple>

<button onclick="uploadDocs()">Upload</button>

<p id="uploadStatus"></p>

</div>


<div class="panel">

<h3>Appointment Scheduler</h3>

<input type="date">

<select>

<option>Phone Consultation</option>
<option>Tax Review</option>
<option>Return Filing</option>

</select>

<button onclick="bookAppointment()">Book</button>

</div>


<div class="panel">

<h3>Invoices & Payments</h3>

<p>Basic Filing - $50</p>

<button onclick="payInvoice()">Pay Invoice</button>

</div>

</div>

<script src="portal.js"></script>

</body>
</html>
