<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="logo">DON Tax Services</div></header>
<section class="portalPage">
<h2>Client Login</h2>
<input id="portalEmail" placeholder="Email">
<input id="portalPass" type="password" placeholder="Password">
<button onclick="portalLogin()">Login</button>
<h3>Upload Documents</h3>
<input type="file" multiple>
<button onclick="uploadDocs()">Upload</button>
<h3>Send Message</h3>
<textarea id="clientMessage" placeholder="Message to tax preparer"></textarea>
<button onclick="sendMessage()">Send</button>
</section>
<script src="portal.js"></script>
</body>
</html>
