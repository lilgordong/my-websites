<!DOCTYPE html>
<html>
<head>
  <title>Pricing</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Pricing Plans</h2>
</header>

<section class="section">
  <div class="card-container">

    <div class="card">
      <h3>Basic</h3>
      <p>$49</p>
      <p>Simple tax return</p>
      <button class="btn">Choose</button>
    </div>

    <div class="card">
      <h3>Standard</h3>
      <p>$99</p>
      <p>Income + deductions</p>
      <button class="btn">Choose</button>
    </div>

    <div class="card">
      <h3>Premium</h3>
      <p>$149</p>
      <p>Full tax optimization</p>
      <button class="btn">Choose</button>
    </div>

  </div>
</section>

</body>
</html>
