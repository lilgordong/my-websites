<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Questionnaire</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="logo">DON Tax Services</div></header>
<section class="questionnairePage">
<h2>Tax Questionnaire</h2>
<form id="taxForm">
<input placeholder="Full Name" required>
<input placeholder="Email" type="email" required>
<input placeholder="SIN Number" required>
<input placeholder="Annual Income" type="number" required>
<select required>
<option value="">Select Employment Type</option>
<option>Employment Income</option>
<option>Self-Employed</option>
<option>Both</option>
</select>
<button type="submit">Submit Tax Info</button>
</form>
</section>
<script>
document.getElementById("taxForm").addEventListener("submit",function(e){
e.preventDefault(); alert("Tax information submitted. We will contact you.");
});
</script>
</body>
</html>
